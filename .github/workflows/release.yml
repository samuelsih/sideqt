name: Build Windows

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build exe
        run: uv run pyinstaller --onefile --windowed --name InstantCourier app.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InstantCourier.exe
